services:
  inventory-api:
    build:
      context: .
      dockerfile: src/Services/Inventory/Inventory.Api/Dockerfile
    ports:
      - "5101:8080"

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Payment.Api/Dockerfile
    ports:
      - "5102:8080"

  orders-api:
    build:
      context: .
      dockerfile: src/Services/Orders/Orders.Api/Dockerfile
    environment:
      Services__InventoryUrl: http://inventory-api:8080
      Services__PaymentUrl: http://payment-api:8080
    ports:
      - "5103:8080"
    depends_on:
      - inventory-api
      - payment-api

  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Gateway.Api/Dockerfile
    environment:
      Services__OrdersUrl: http://orders-api:8080
      Services__InventoryUrl: http://inventory-api:8080
    ports:
      - "5100:8080"
    depends_on:
      - orders-api
